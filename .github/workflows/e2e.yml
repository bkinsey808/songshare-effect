name: E2E Tests (Playwright)

on:
  push:
    branches: [main]
    # Ignore content-only / docs-only pushes to avoid running expensive e2e unnecessarily
    paths-ignore:
      - "docs/*Unable to resolve action `wagoid/commitlint-action@v3`, repository or version not found*"
      - ".github/**"
      - "README.md"
      - "CONTRIBUTING.md"
  schedule:
    - cron: "0 3 * * *" # nightly UTC 03:00
  workflow_dispatch: {}

# Avoid overlapping e2e runs for the same ref (reduces runner waste)
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  e2e:
    name: End-to-end tests
    runs-on: ubuntu-latest
    environment: staging
    # no elevated permissions required; dynamic run title update removed
    env:
      # Use a repo-local folder for Playwright browsers so we can cache it
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.playwright-browsers
      VITE_STORAGE_BACKEND: ${{ vars.VITE_STORAGE_BACKEND }}
      VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
      VITE_ENVIRONMENT: ${{ vars.VITE_ENVIRONMENT }}
      VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
      VITE_WEB_BASE_URL: ${{ vars.VITE_WEB_BASE_URL }}
      VITE_BUILD_NUMBER: ${{ vars.VITE_BUILD_NUMBER }}
      VITE_APP_BRAND: ${{ vars.VITE_APP_BRAND }}
      VITE_APP_NAME: ${{ vars.VITE_APP_NAME }}
      VITE_SUPPORT_EMAIL_ADDRESS: ${{ vars.VITE_SUPPORT_EMAIL_ADDRESS }}
      VITE_SEO_APP_TITLE: ${{ vars.VITE_SEO_APP_TITLE }}
      VITE_SEO_APP_DESCRIPTION: ${{ vars.VITE_SEO_APP_DESCRIPTION }}
      VITE_SEO_APP_KEYWORDS: ${{ vars.VITE_SEO_APP_KEYWORDS }}
      GOOGLE_CLIENT_ID: ${{ vars.GOOGLE_CLIENT_ID }}
      MS_CLIENT_ID: ${{ vars.MS_CLIENT_ID }}
      AMAZON_CLIENT_ID: ${{ vars.AMAZON_CLIENT_ID }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      SUPABASE_JWT_SECRET: ${{ secrets.SUPABASE_JWT_SECRET }}
      E2E_TEST_SONG_SLUG: ${{ vars.E2E_TEST_SONG_SLUG }}
      E2E_TEST_PLAYLIST_SLUG: ${{ vars.E2E_TEST_PLAYLIST_SLUG }}
      E2E_TEST_COMMUNITY_SLUG: ${{ vars.E2E_TEST_COMMUNITY_SLUG }}
      E2E_TEST_EVENT_SLUG: ${{ vars.E2E_TEST_EVENT_SLUG }}
      E2E_TEST_IMAGE_SLUG: ${{ vars.E2E_TEST_IMAGE_SLUG }}
      E2E_TEST_USER2_USERNAME: ${{ vars.E2E_TEST_USER2_USERNAME }}
      E2E_GOOGLE_USER_EMAIL: ${{ vars.E2E_GOOGLE_USER_EMAIL }}
      E2E_GOOGLE_USER2_EMAIL: ${{ vars.E2E_GOOGLE_USER2_EMAIL }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # display-title update removed

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build frontend and api
        run: |
          npm run build:client:staging
          npm run build:api

      - name: Start preview server
        run: |
          # start Vite preview in background on port 5173 bound to IPv4 localhost
          nohup npm run preview -- --host 127.0.0.1 --port 5173 > preview.log 2>&1 &
          echo $! > preview.pid
          echo "preview started (background)"
      - name: Wait for preview (accept http or https)
        run: |
          WAIT_ON_TIMEOUT_MS=180000
          # Prefer 127.0.0.1 so PREVIEW_URL matches the auth session cookie domain
          # (cookies are domain-bound to 127.0.0.1, not localhost).
          if npx wait-on -t "$WAIT_ON_TIMEOUT_MS" http://127.0.0.1:5173; then
            echo "PREVIEW_URL=http://127.0.0.1:5173" >> $GITHUB_ENV
            echo "preview available at http://127.0.0.1:5173"
          elif npx wait-on -t "$WAIT_ON_TIMEOUT_MS" http://localhost:5173; then
            echo "PREVIEW_URL=http://localhost:5173" >> $GITHUB_ENV
            echo "preview available at http://localhost:5173"
          elif npx wait-on -t "$WAIT_ON_TIMEOUT_MS" https://127.0.0.1:5173; then
            echo "PREVIEW_URL=https://127.0.0.1:5173" >> $GITHUB_ENV
            echo "preview available at https://127.0.0.1:5173"
          elif npx wait-on -t "$WAIT_ON_TIMEOUT_MS" https://localhost:5173; then
            echo "PREVIEW_URL=https://localhost:5173" >> $GITHUB_ENV
            echo "preview available at https://localhost:5173"
          else
            echo "Preview did not become available after ${WAIT_ON_TIMEOUT_MS}ms" >&2
            exit 1
          fi

      - name: Cache Playwright auth sessions
        uses: actions/cache@v5
        id: playwright-auth-cache
        with:
          path: e2e/.auth
          key: ${{ runner.os }}-playwright-auth-${{ hashFiles('e2e/.auth/*.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-auth-

      - name: Report auth cache status
        run: |
          if [ "${{ steps.playwright-auth-cache.outputs.cache-hit }}" = "true" ]; then
            echo "Playwright auth cache hit."
          else
            echo "Playwright auth cache miss."
          fi

      - name: Generate Playwright storageState sessions
        run: |
          mkdir -p e2e/.auth
          if [ ! -f "e2e/.auth/google-user.json" ]; then
            PLAYWRIGHT_BASE_URL="$PREVIEW_URL" E2E_GOOGLE_USER_EMAIL="$E2E_GOOGLE_USER_EMAIL" \
              npx bun e2e/utils/create-google-user-session.bun.ts
          fi
          if [ ! -f "e2e/.auth/google-user-2.json" ]; then
            PLAYWRIGHT_BASE_URL="$PREVIEW_URL" E2E_GOOGLE_USER_EMAIL="$E2E_GOOGLE_USER2_EMAIL" \
              E2E_SESSION_OUTPUT="e2e/.auth/google-user-2.json" \
              npx bun e2e/utils/create-google-user-session.bun.ts
          fi

      - name: Cache repo-local Playwright browser binaries
        uses: actions/cache@v5
        with:
          path: |
            .playwright-browsers
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo npx playwright install-deps

      - name: Ensure Playwright browsers
        # Use Playwright CLI to fetch browsers. We intentionally avoid the
        # deprecated microsoft/playwright-github-action and historically skipped
        # automatic 'install-deps' to prevent distro-specific apt failures on certain
        # GitHub runners (eg. 'noble' / Ubuntu 24.04). However WebKit needs GTK4 and
        # multimedia libs on some runner images; the step above installs them so
        # browser binaries can launch successfully.
        run: npm run playwright:install

      - name: Run Playwright tests
        run: |
          echo "Using preview url: $PREVIEW_URL"
          PLAYWRIGHT_BASE_URL="$PREVIEW_URL" npx playwright test --reporter=list,junit

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: playwright-report

      - name: Upload preview log
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: preview-log
          path: preview.log
